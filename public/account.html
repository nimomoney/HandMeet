<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HandMeet - Mon Profil</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#7c4dff" />
  </head>
  <body>
    <div class="app-container">
      <header>
        <div class="logo">Mon Profil</div>
      </header>

      <main id="tinder-card">
        <div class="card">
          <div class="card-image" id="photo-profil-background">
            <div class="card-info">
              <div class="name-age">
                <span id="affichage-prenom">...</span>,
                <span id="affichage-age">--</span>
              </div>
              <div class="badges">
                <span class="badge" id="affichage-email">...</span>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer class="auth-footer" style="margin-top: 20px">
        <p>
          Heureux de vous revoir,
          <span id="affichage-nom" style="font-weight: bold">...</span>
        </p>
        <button
          id="btn-deconnexion"
          class="btn-secondary"
          style="
            border: none;
            background: none;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
          "
        >
          Se déconnecter
        </button>
      </footer>

      <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
          <i class="fas fa-home"></i>
          <span>Accueil</span>
        </a>
        <a href="finduser.html" class="nav-item">
          <i class="fas fa-search"></i>
          <span>Explorer</span>
        </a>
        <a href="chats.html" class="nav-item">
          <span class="nav-badge">3</span>
          <i class="fas fa-comment-dots"></i>
          <span>Messages</span>
        </a>
        <a href="account.html" class="nav-item active"> 
          <i class="fas fa-user"></i>
          <span>Profil</span>
        </a>
      </nav>
    </div>
    <script type="module" src="account.js"></script>
  </body>
</html>
