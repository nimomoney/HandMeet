<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>HandMeet - Trouver des profils</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <script type="module" src="./finduser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <div class="app-container">
      <header>
        <div class="logo">HandMeet</div>
      </header>

      <main id="tinder-card">
        <div class="card">
          <div
            id="card-bg"
            class="card-image"
            style="
              background-image: url(&quot;https://images.unsplash.com/photo-1511367461989-f85a21fda167?w=500&quot;);
            "
          >
            <div class="card-info">
              <div class="name-age">
                <span id="user-name">Chargement...</span>,
                <span id="user-age">--</span>
              </div>
              <div class="badges" id="user-badges"></div>
            </div>
          </div>
        </div>
      </main>

      <div class="actions">
        <button class="btn dislike" onclick="dislikeUser()">
          <i class="fa-solid fa-xmark"></i>
        </button>
        <button class="btn info">
          <i class="fa-solid fa-circle-info"></i>
        </button>
        <button class="btn like" onclick="likeUser()">
          <i class="fa-solid fa-heart"></i>
        </button>
      </div>

      <nav class="bottom-nav">
        <a href="accueil.html" class="nav-item">
          <i class="fas fa-home"></i>
          <span>Accueil</span>
        </a>
        <a href="finduser.html" class="nav-item active">
          <i class="fas fa-search"></i>
          <span>Explorer</span>
        </a>
        <a href="chats.html" class="nav-item">
          <span class="nav-badge">3</span>
          <i class="fas fa-comment-dots"></i>
          <span>Messages</span>
        </a>
        <a href="account.html" class="nav-item">
          <i class="fas fa-user"></i>
          <span>Profil</span>
        </a>
      </nav>
    </div>
  </body>
</html>
