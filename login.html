<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandMeet - Connexion</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="./login.js"></script>
</head>
<body>
    <div class="app-container auth-screen">
        <header>
            <a href="index.html" class="back-btn">←</a>
            <div class="logo">HandMeet</div>
        </header>

        <div class="auth-header">
            <h2>Bon retour !</h2>
            <p>Heureux de te revoir.</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="ton@email.com" required>
            </div>
            <button type="submit" class="btn-submit">Se connecter</button>
        </form>

        <div class="auth-footer">
            Pas encore de compte ? <a href="signup.html">Inscris-toi</a>
        </div>
    </div>
</body>
</html>
