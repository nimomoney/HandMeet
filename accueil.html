<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <div class="app-container">
        <header>
            <div class="logo">MonProfil</div>
        </header>

        <main id="tinder-card">
            <div class="card">
                <div class="card-image" style="background: linear-gradient(to bottom, var(--primary-color), #2d3436);">
                    <div class="card-info">
                        <div class="name-age">
                            <span id="affichage-prenom">...</span>, 
                            <span id="affichage-age">--</span>
                        </div>
                        <div class="badges">
                            <span class="badge" id="affichage-email">...</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="auth-footer">
            <p>Heureux de vous revoir, <span id="affichage-nom" style="font-weight: bold;">...</span></p>
            <button id="btn-deconnexion" class="btn-secondary" style="border:none; background:none; cursor:pointer; width:100%; margin-top:15px;">
                Se déconnecter
            </button>
        </footer>
    </div>

    <script type="module" src="accueil.js"></script>
</body>
</html>
